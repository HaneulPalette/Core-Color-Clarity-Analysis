<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Core Color Clarity</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

.logo {
  width: 100px;
  border-radius: 50%;
  margin-bottom: 10px;
}

button {
  padding: 12px 20px;
  background: black;
  color: white;
  border: none;
  margin-top: 15px;
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
}

.result {
  margin-top: 20px;
  display: none;
  background: #f5f5f5;
  padding: 15px;
  text-align: left;
  white-space: pre-line;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<img src="logo.png" class="logo" alt="Logo">

<h1>🌿 Core Color Clarity</h1>
<p>A refined understanding of your natural color direction.</p>

<!-- GOOGLE FORM BUTTON -->
<a href="https://forms.gle/X5q31CnBjPVBvDjs9" target="_blank">
  <button>Start Analysis (Fill Form)</button>
</a>

<br>

<!-- PREVIEW -->
<button onclick="showPreview()">View Preview Report</button>

<div class="result" id="previewBox"></div>

<!-- DOWNLOAD -->
<button id="downloadBtn" style="display:none;" onclick="downloadPDF()">
Download Full Report (PDF)
</button>

</div>

<script>

let reportData = "";

function showPreview(){

  reportData = `
HANEUL PALETTE

CORE COLOR CLARITY REPORT

Season: Warm Autumn
Undertone: Warm

Best Colors:
- Olive Green
- Mustard
- Terracotta
- Warm Brown
- Cream

Avoid:
- Neon shades
- Cool blue tones

Style Direction:
Warm earthy tones enhance your natural harmony.
`;

  document.getElementById("previewBox").innerText = reportData;
  document.getElementById("previewBox").style.display = "block";

  document.getElementById("downloadBtn").style.display = "inline-block";
}

function downloadPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const img = new Image();
  img.src = "logo.png";

  img.onload = function(){

    doc.addImage(img, "PNG", 85, 10, 40, 40);

    doc.setFontSize(14);
    doc.text("Core Color Clarity Report", 50, 60);

    doc.setFontSize(11);
    const lines = doc.splitTextToSize(reportData, 180);
    doc.text(lines, 10, 75);

    doc.save("Core_Color_Clarity_Report.pdf");
  }
}

</script>

</body>
</html>
