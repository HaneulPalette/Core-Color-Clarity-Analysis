<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Core Color Clarity</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

.logo {
  width: 90px;
  border-radius: 50%;
}

iframe {
  width: 100%;
  height: 600px;
  border: none;
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  display: none;
  background: #f5f5f5;
  padding: 15px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<img src="logo.png" class="logo">

<h1>🌿 Core Color Clarity</h1>
<p>A refined understanding of your natural color direction.</p>

<!-- GOOGLE FORM EMBED -->
<iframe src="https://forms.gle/fFyg7vk1AhuXd78C8"></iframe>

<!-- PREVIEW BUTTON -->
<button onclick="showPreview()">View Preview Report</button>

<div class="result" id="previewBox"></div>

<!-- PAYMENT SECTION -->
<div id="paymentBox" style="display:none;">
  <h3>💳 Complete Payment</h3>
  <p>₹499 (India)</p>

  <img src="upi.png" width="200"><br><br>

  <input type="text" id="txn" placeholder="Enter UPI Transaction ID / PNR">
  <br>
  <button onclick="verifyPayment()">Submit Payment</button>
</div>

<!-- DOWNLOAD -->
<button id="downloadBtn" style="display:none;" onclick="downloadPDF()">
Download Full Report (PDF)
</button>

</div>

<script>

let fullReport = "";

function showPreview() {

  const previewText = `
Preview Report

Season: Warm Autumn
Undertone: Warm

(Full report includes detailed colors and styling guidance)
`;

  document.getElementById("previewBox").innerText = previewText;
  document.getElementById("previewBox").style.display = "block";

  document.getElementById("paymentBox").style.display = "block";

  fullReport = `
HANEUL PALETTE

CORE COLOR CLARITY REPORT

Season: Warm Autumn
Undertone: Warm

Best Colors:
- Olive Green
- Mustard
- Terracotta
- Warm Brown
- Cream

Avoid:
- Neon shades
- Cool blue tones

Style Direction:
Warm earthy tones enhance your natural harmony and balance.
`;
}

function verifyPayment() {

  let txn = document.getElementById("txn").value;

  if(txn.length < 5){
    alert("Please enter valid Transaction ID");
    return;
  }

  alert("Payment recorded. You can now download your report.");

  document.getElementById("downloadBtn").style.display = "inline-block";
}

function downloadPDF() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const img = new Image();
  img.src = "logo.png";

  img.onload = function () {

    // LOGO
    doc.addImage(img, "PNG", 85, 10, 40, 40);

    // TITLE
    doc.setFontSize(14);
    doc.text("Core Color Clarity Report", 50, 60);

    // CONTENT
    doc.setFontSize(11);
    const lines = doc.splitTextToSize(fullReport, 180);
    doc.text(lines, 10, 75);

    // SAVE PDF
    doc.save("Core_Color_Clarity_Report.pdf");
  };
}

</script>

</body>
</html>
