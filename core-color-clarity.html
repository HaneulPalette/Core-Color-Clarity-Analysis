<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Core Color Clarity</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

.logo {
  width: 90px;
  border-radius: 50%;
  margin-bottom: 10px;
}

iframe {
  width: 100%;
  height: 600px;
  border: none;
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  border-radius: 6px;
}

.result {
  margin-top: 20px;
  display: none;
  background: #f5f5f5;
  padding: 15px;
  text-align: left;
  white-space: pre-line;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<img src="logo.png" class="logo" alt="Haneul Palette Logo">

<h1>🌿 Core Color Clarity</h1>
<p>A refined understanding of your natural color direction.</p>

<!-- ✅ CORRECT GOOGLE FORM EMBED -->
<iframe 
src="https://docs.google.com/forms/d/e/1FAIpQLSfFyg7vk1AhuXd78C8/viewform?embedded=true">
Loading…
</iframe>

<!-- PREVIEW BUTTON -->
<button onclick="showPreview()">View Preview Report</button>

<!-- PREVIEW BOX -->
<div class="result" id="previewBox"></div>

<!-- DOWNLOAD BUTTON -->
<button id="downloadBtn" style="display:none;" onclick="downloadPDF()">
Download Full Report (PDF)
</button>

</div>

<script>

let reportData = "";

function showPreview() {

  reportData = `
HANEUL PALETTE

CORE COLOR CLARITY REPORT

Season: Warm Autumn
Undertone: Warm

Best Colors:
- Olive Green
- Mustard
- Terracotta
- Warm Brown
- Cream

Avoid:
- Neon shades
- Cool blue tones

Style Direction:
Warm earthy tones enhance your natural harmony and balance.
`;

  document.getElementById("previewBox").innerText = reportData;
  document.getElementById("previewBox").style.display = "block";

  document.getElementById("downloadBtn").style.display = "inline-block";
}

function downloadPDF() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const img = new Image();
  img.src = "logo.png";

  img.onload = function () {

    // LOGO IN PDF
    doc.addImage(img, "PNG", 85, 10, 40, 40);

    // TITLE
    doc.setFontSize(14);
    doc.text("Core Color Clarity Report", 50, 60);

    // CONTENT
    doc.setFontSize(11);
    const lines = doc.splitTextToSize(reportData, 180);
    doc.text(lines, 10, 75);

    // SAVE PDF
    doc.save("Core_Color_Clarity_Report.pdf");
  };
}

</script>

</body>
</html>
